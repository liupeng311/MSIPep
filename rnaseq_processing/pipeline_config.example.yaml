# =============================================================================
# RNA-seq neoantigen prediction pipeline config
# Copy this file to pipeline_config.yaml and edit paths and sample info for your environment
# Run: python run_rnaseq_pipeline.py --config pipeline_config.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# Pipeline mode (choose one)
# -----------------------------------------------------------------------------
# tumor_only_pe  : Tumor sample only, paired-end RNA-seq (STAR + Mutect2 tumor-only)
# tumor_only_se  : Tumor sample only, single-end RNA-seq (STAR + Mutect2 tumor-only)
# tumor_normal   : Tumor-normal paired, paired-end RNA-seq (BWA + Mutect2 + ANNOVAR)
mode: tumor_only_pe

# -----------------------------------------------------------------------------
# Sample and output
# -----------------------------------------------------------------------------
sample_name: SAMPLE01
output_dir: /data/output/SAMPLE01
threads: 16

# -----------------------------------------------------------------------------
# Input FASTQ (fill fields according to mode)
# -----------------------------------------------------------------------------
input:
  # tumor_only_pe / tumor_only_se
  fq1: /data/fastq/SAMPLE01_R1.fastq.gz
  fq2: /data/fastq/SAMPLE01_R2.fastq.gz   # may be empty for tumor_only_se

  # tumor_normal mode
  tumor_rna_1p: /data/fastq/tumor_R1.fastq.gz
  tumor_rna_2p: /data/fastq/tumor_R2.fastq.gz
  normal_rna_1p: /data/fastq/normal_R1.fastq.gz
  normal_rna_2p: /data/fastq/normal_R2.fastq.gz

# -----------------------------------------------------------------------------
# Reference genome and annotation
# -----------------------------------------------------------------------------
reference:
  genome_fasta: /data/reference/hg38/hg38.fa
  star_index: /data/reference/STAR_index
  gtf: /data/reference/gencode.v47.basic.annotation.gtf

# -----------------------------------------------------------------------------
# Variant databases (used in tumor_only mode)
# -----------------------------------------------------------------------------
databases:
  dbsnp: /data/reference/dbsnp_146.hg38.vcf.gz
  gnomad: /data/reference/af-only-gnomad.hg38.vcf.gz
  common_biallelic: /data/reference/small_exac_common_3.hg38.vcf.gz
  pon: /data/reference/1000g_pon.hg38.vcf.gz
  redi_bed: /data/reference/REDIportal_hg38.bed
  # Additional known sites for tumor_normal BQSR
  mills_indels: /data/reference/Mills_and_1000G_gold_standard.indels.hg38.vcf

# -----------------------------------------------------------------------------
# Software paths
# -----------------------------------------------------------------------------
tools:
  trimmomatic_jar: ./software/Trimmomatic/trimmomatic-0.39.jar
  trimmomatic_adapters_pe: ./software/Trimmomatic/adapters/TruSeq3-PE.fa
  trimmomatic_adapters_se: ./software/Trimmomatic/adapters/TruSeq3-SE.fa
  # VEP (requires Wildtype + Frameshift plugins for pVACtools-style translation)
  vep: vep
  vep_cache_dir: /data/reference/vep_cache
  vep_plugins_dir: /data/software/ensembl-vep/Plugins
  # ANNOVAR (tumor_normal mode)
  annovar_dir: ./software/annovar
  annovar_humandb: ./humandb

# -----------------------------------------------------------------------------
# VEP annotation parameters
# -----------------------------------------------------------------------------
vep:
  species: homo_sapiens
  assembly: GRCh38
  # Skip VEP when input is already a VEP-annotated VCF
  skip: false
  # Manually specify existing VEP VCF to skip automatic annotation
  input_vcf: ""

# -----------------------------------------------------------------------------
# Step 2: VCF filter parameters (2_VCF_filter_WGS.py)
# -----------------------------------------------------------------------------
vcf_filter:
  min_t_depth: 10
  min_t_alt_count: 5
  min_vaf: 0.05
  max_gnomad_af: 0.01
  tumor_col: 9          # single-sample VCF=9; tumor column usually 10 for tumor-normal pairs

# -----------------------------------------------------------------------------
# Step 4/5: Peptide generation (Methods §2.3)
# -----------------------------------------------------------------------------
peptide:
  # Non-coding (4.nocoding_mut_pep.py)
  noncoding_lengths: "8,9,10,11"
  noncoding_window: 100
  # Coding (5.coding_mut_pep.py; Methods: 24 aa flanking; frameshift to protein end)
  flanking_length: 24           # amino acids on each side of mutation site
  downstream_length: 0          # 0 = extend frameshift MT to end of protein (Methods)
  epitope_length: 0             # 0=full MT/WT subsequence; >0=only peptides containing neo-epitope
  canonical_only: true          # prefer canonical transcripts
  biotypes: ["protein_coding"]

# -----------------------------------------------------------------------------
# Pipeline control: skip completed steps (resume from checkpoint)
# -----------------------------------------------------------------------------
steps:
  run_mutation_calling: true
  run_vep: true
  run_vcf_filter: true
  run_vcf_split: true
  run_coding_peptides: true
  run_noncoding_peptides: true
